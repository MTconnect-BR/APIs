server:
  host: 0.0.0.0
  port: 8080

ratelimit:
  enabled: true
  default: "100/min"
  rules:
    - path: "/api/v1/*"
      limit: "1000/min"
    - path: "/api/v2/*"
      limit: "500/min"

cache:
  enabled: true
  driver: memory
  redis:
    addr: localhost:6379
  ttl: 5m

auth:
  enabled: false
  providers:
    - type: jwt
      secret: "${JWT_SECRET}"
      issuer: "https://your-domain.com"
    - type: apikey
      header: "X-API-Key"

loadbalancer:
  enabled: false
  strategy: round-robin
  backends:
    - url: "http://localhost:3000"
      weight: 1
    - url: "http://localhost:3001"
      weight: 2

observe:
  metrics:
    enabled: true
    path: /metrics
  logs:
    level: info
    format: json
  tracing:
    enabled: true
    sample: 0.1

docs:
  enabled: true
  path: /docs
  title: "My API"
  version: "1.0.0"

versioning:
  strategy: header
  header: "X-API-Version"
  default: "v1"
