server:
  host: 0.0.0.0
  port: 8080
  allowedOrigins:
    - "*"

storage:
  enabled: true
  path: ./data/velo.db
  seed: true

ratelimit:
  enabled: true
  default: "100/min"

cache:
  enabled: true
  driver: memory
  ttl: 5m

auth:
  enabled: false

loadbalancer:
  enabled: false

observe:
  metrics:
    enabled: true
    path: /metrics
  logs:
    enabled: true
    level: info
    format: json
  tracing:
    enabled: false

docs:
  enabled: true
  path: /docs
  title: "Velo API Gateway"
  version: "2.0.0"

versioning:
  strategy: header
  header: "X-API-Version"
  default: "v1"

batch:
  enabled: true
  window: "5ms"
  maxBatchSize: 100
  flushInterval: "10ms"
  classifiers:
    - endpoint
